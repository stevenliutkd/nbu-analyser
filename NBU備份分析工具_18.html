<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>NBU 備份失敗分析工具</title>
<style>
  :root{
    --bg:#1b2130; --panel:#242b3d; --panel2:#2c3448; --border:#3a4258;
    --text:#eef0f5; --sub:#a8b0c3; --accent:#5b93ff; --ok:#3ecf8e; --bad:#f0565c; --warn:#f5c242;
  }
  *{box-sizing:border-box;}
  html, body{max-width:100%; overflow-x:hidden;}
  body{margin:0;font-family:"Segoe UI","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text);font-size:20px;}
  header{padding:20px 24px;border-bottom:1px solid var(--border);}
  header h1{margin:0 0 4px;font-size:30px;}
  header p{margin:0;color:var(--sub);font-size:18px;}
  .wrap{padding:20px 24px;display:grid;grid-template-columns:1fr;gap:16px;max-width:100%;}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px;max-width:100%;}
  textarea{width:100%;height:160px;background:var(--panel2);color:var(--text);border:1px solid var(--border);
    border-radius:8px;padding:10px;font-family:Consolas,monospace;font-size:16px;resize:vertical;box-sizing:border-box;}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:10px;}
  button{background:var(--accent);color:#fff;border:none;padding:11px 20px;border-radius:6px;cursor:pointer;font-size:18px;}
  button.secondary{background:var(--panel2);color:var(--text);border:1px solid var(--border);}
  button:hover{filter:brightness(1.1);}
  .stat{font-size:16px;color:var(--sub);}
  .tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:16px;font-weight:600;}
  .tag.big{font-size:24px;padding:7px 18px;}
  .tag.ok{background:rgba(62,207,142,.18);color:var(--ok);}
  .tag.bad{background:rgba(240,86,92,.18);color:var(--bad);}
  .tag.warn{background:rgba(245,194,66,.18);color:var(--warn);}
  .group{border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden;max-width:100%;}
  .group-head{padding:12px 16px;background:var(--panel2);display:flex;justify-content:space-between;align-items:center;cursor:pointer;flex-wrap:wrap;gap:6px;}
  .group-head:hover{background:#333c54;}
  .group-body{padding:0 16px 16px;display:none;max-width:100%;}
  .group-body.open{display:block;}
  .table-scroll{max-width:100%; overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:17px;margin-top:8px;table-layout:fixed;}
  th,td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:left;white-space:normal;word-break:break-word;}
  th{color:var(--sub);font-weight:600;}
  .errbox{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-top:8px;font-size:17px;}
  .errbox a{color:var(--accent);}
  .empty{color:var(--sub);font-size:17px;padding:20px;text-align:center;}
  .badge-type{font-size:14px;padding:1px 7px;border-radius:4px;background:#3a4258;color:var(--sub);margin-left:6px;}
  h2{font-size:23px;margin:0 0 8px;}
  h3{font-size:20px;margin:12px 0 4px;color:var(--sub);}
  .small{font-size:16px;color:var(--sub);}
</style>
</head>
<body>

<header>
  <h1>NBU 每日備份回報 分析工具</h1>
</header>

<div class="wrap">

  <div class="card">
    <h2>1. 貼上原始資料</h2>
    <p class="small">直接從 Outlook / 郵件中選取整張表格（含或不含表頭皆可），Ctrl+C 後貼在這裡。</p>
    <textarea id="pasteArea" placeholder="在此貼上表格內容 (Ctrl+V)..."></textarea>
    <div class="row">
      <button onclick="analyze()">分析</button>
      <button class="secondary" onclick="clearAll()">清除</button>
      <span class="stat" id="parseStat"></span>
    </div>
  </div>

  <div class="card" id="summaryCard" style="display:none;">
    <h2>2. 摘要</h2>
    <div id="summaryBox"></div>
  </div>

  <div class="card" id="detailCard" style="display:none;">
    <h2>3. 有 Failed 的 Client / Policy 明細（點擊展開）</h2>
    <div id="detailBox"></div>
  </div>

  <div class="card">
    <div class="group-head" onclick="toggleErrRef()" style="cursor:pointer;border-radius:8px;">
      <span><h2 style="margin:0;">常用 Error Code 對照表 <span id="errRefArrow">▾</span></h2></span>
      <span class="small">點擊展開 / 收合</span>
    </div>
    <div id="errRefBody" style="display:none;margin-top:10px;">
      <p class="small">來源：Veritas NetBackup Status Codes Reference Guide。完整代碼請至原廠網站查詢。</p>
      <div id="errCodeTable"></div>
    </div>
  </div>

</div>

<script>
// ---------- Error code reference (common NBU status codes) ----------
const ERR_CODES = {
  "0": {short:"成功", detail:"備份 / 排程正常完成，無錯誤。"},
  "1": {short:"部分成功", detail:"作業完成但有部分檔案未備份成功，通常是檔案在備份時被鎖定或修改，多屬可忽略的警告等級。"},
  "2": {short:"沒有任何檔案被備份", detail:"最常見於資料庫類備份（如 MS-SQL、Lotus Notes）失敗，一般檔案系統備份較少見此代碼。常見原因是資料庫 agent 的批次腳本(BCH)設定錯誤或檔案唯讀。"},
  "6": {short:"要備份的檔案不存在", detail:"備份清單中指定的檔案系統/路徑不存在，常見於備份選項設定錯誤或該路徑已被移除。"},
  "10": {short:"排程管理員發生錯誤", detail:"排程管理程序異常，通常需檢查 NBU 主機服務狀態。"},
  "11": {short:"系統呼叫失敗 (system call failed)", detail:"Client 或 Media Server 端某個系統呼叫失敗，最常見原因包含：Client 端服務未啟動/當機、網路中斷或逾時、代理程式(Client)版本相容性問題、磁碟/儲存空間不足、bpbkar 或相關進程異常終止。建議查看該 Client 上的 bpbkar / bpcd 日誌進一步定位。"},
  "13": {short:"檔案讀取失敗", detail:"檔案在備份過程中無法讀取，可能是權限不足或檔案已被刪除/鎖定。"},
  "14": {short:"檔案寫入失敗", detail:"寫入備份媒體/儲存單元失敗，常見於儲存空間不足或媒體/儲存裝置異常。"},
  "21": {short:"連線通道建立失敗 (socket open failed)", detail:"Socket 是程式之間用來互相通訊的網路連線通道，可以想成是兩台電腦講話用的「電話線」。這個代碼代表 NetBackup 連這條線都建立不起來，通常是系統資源（可用連接埠/檔案代號）不足，或網路卡/網路堆疊異常。"},
  "23": {short:"Socket 讀取失敗 (socket read failed)", detail:"Client 與 Master/Media Server 間的 socket 讀取逾時，常見原因：網路延遲、主機名稱解析(DNS/hosts)問題、備份檔案數過多(百萬等級)、User-directed operation timeout 設太短。可用 bpclntcmd 測試雙向名稱解析。"},
  "24": {short:"Client 端逾時 (socket read failed)", detail:"NBU Client 與 Master/Media Server 之間連線逾時或中斷，常見於網路不穩或 Client 端負載過高。"},
  "25": {short:"無法連線至 Client", detail:"Media Server 無法連線到 Client，需檢查 Client 服務(bpcd)、防火牆、DNS/hosts 設定。"},
  "27": {short:"子進程被訊號終止 (child process killed by signal)", detail:"備份/還原過程中的子進程被系統訊號強制中止，常見原因是系統資源不足、防毒軟體或系統管理者手動終止進程。"},
  "29": {short:"執行指令失敗 (failed trying to exec a command)", detail:"NetBackup 嘗試呼叫某個外部指令/腳本執行失敗，常見於指令路徑錯誤、權限不足，或該執行檔遺失/毀損。"},
  "37": {short:"無效的 Media Server 或主控台請求", detail:"一個未被列入 Server 清單的 Media Server 或 NetBackup 遠端管理主控台，嘗試連線 Master Server 的請求daemon。常見於新增/變更 Media Server 後，Master 端的 Server list 未同步更新。"},
  "41": {short:"網路連線逾時", detail:"與 Client 建立連線時逾時，通常是網路壅塞或 Client 忙碌中。"},
  "50": {short:"Client 進程中止", detail:"用戶端備份程序被中止，可能為手動取消或程序異常終止。"},
  "51": {short:"Client 進程被系統終止", detail:"作業系統或防毒軟體終止了備份程序。"},
  "54": {short:"連線 Client 逾時 (timed out connecting to client)", detail:"Media Server 60 秒內未收到 Client 回應，常見原因：Client 端 NetBackup 服務未啟動、防火牆阻擋、主機名稱解析錯誤、bp.conf 缺少 SERVER 項目，或防毒軟體攔截連線。"},
  "58": {short:"無法連線至 Client 的備份服務", detail:"通常是 Client 端 NetBackup 服務未啟動，或連接埠被防火牆阻擋。"},
  "61": {short:"vnetd proxy 發生錯誤", detail:"安全通訊(SSL/憑證)交握失敗，常伴隨 76xx 系列代碼一起出現(如 7641)。常見原因：Client 憑證遺失/過期/被撤銷、Master Server 別名(alias)設定錯誤、CLIENT_NAME 設定錯誤。建議同時查看是否有 76xx 代碼一併出現，並依該代碼進一步排除。"},
  "71": {short:"部分備份成功但有錯誤", detail:"多資料流備份中部分資料流失敗。"},
  "83": {short:"媒體開啟錯誤 (media open error)", detail:"寫入 Storage Unit 時開啟媒體失敗，常見原因：磁碟 Storage Unit 設定在系統磁碟(root device)上、NAS/NFS 掛載權限或連線問題、MSDP/Dedup 服務忙碌或記憶體不足、Data Domain/OST 外接儲存的 plug-in 或連線異常。建議查看 bptm/bpdm log 進一步定位。"},
  "84": {short:"媒體寫入失敗", detail:"備份媒體(磁碟/磁帶)寫入錯誤，需檢查 Storage Unit 空間或媒體健康狀態。"},
  "96": {short:"無可用磁碟儲存單元", detail:"目標 Storage Unit 空間不足或無法存取，是很常見造成整批失敗的原因。"},
  "129": {short:"磁碟儲存單元已滿 (disk storage unit is full)", detail:"寫入的磁碟 Storage Unit（DSU/DSSU）空間已滿，導致備份無法寫入。可用 df -h 檢查該儲存單元的可用空間；解法包含：清除已過期但尚未回收的映像、調整 retention 等級、暫時改用其他 Storage Unit、或擴充磁碟空間。若持續發生，建議檢查該 Storage Unit 的 high/low watermark 設定是否合理。"},
  "144": {short:"指令使用方式錯誤 (invalid command usage)", detail:"NetBackup 進程被以錯誤參數啟動，或 Master/Media/Client 之間版本不相容。建議確認指令參數，或檢查各主機的 NBU 版本是否一致。"},
  "150": {short:"作業被使用者或系統取消", detail:"排程或作業遭手動終止(如手動 Cancel Job)。"},
  "156": {short:"快照建立失敗", detail:"Snapshot(如 VMware/儲存快照)建立失敗，常見於磁碟空間不足或快照技術(VSS等)異常。"},
  "174": {short:"備份選項清單中有錯誤", detail:"備份選項(Backup Selection)語法錯誤或路徑格式不正確。"},
  "191": {short:"未偵測到有效的映像可供還原/驗證", detail:"通常出現在 Duplication/Verify 作業，找不到來源映像。"},
  "196": {short:"備份逾時 (在時間窗口內未完成)", detail:"作業超過該排程視窗(Backup Window)允許時間仍未完成，常發生在資料量過大或效能瓶頸時，是 Full 備份最常見的失敗原因之一。"},
  "200": {short:"排程找不到需要備份的對象 (scheduler found no backup)", detail:"NBU 排程器(nbpem)檢查後找不到符合條件的 Client 可備份，常見原因：備份時間視窗未開啟、Policy 被設為 inactive、Client 最近已備份過(未到頻率間隔)、或該 Policy 底下沒有 Client。多數情況屬正常訊息，非故障。"},
  "213": {short:"儲存生命週期原則(SLP)發生錯誤", detail:"與 Storage Lifecycle Policy 有關的複寫/處理失敗，常見於 AIR(異地複寫)作業。"},
  "230": {short:"指定的 Policy 不存在於設定資料庫", detail:"常見原因：Policy 名稱打錯或已被刪除/改名、Disk Staging Storage Unit(DSSU) 排程設定異常導致內部設定檔損壞、備份腳本內指定了不存在的 Policy 名稱。建議確認 Policy 是否存在、名稱大小寫是否正確。"},
  "233": {short:"沒有可用的儲存單元群組成員", detail:"Storage Unit Group 內所有成員皆無法使用。"},
  "285": {short:"快照相關的錯誤", detail:"Snapshot 建立或處理時發生底層儲存/VSS 相關錯誤。"},
  "2009": {short:"所有相容磁帶機路徑皆為 down 狀態", detail:"備份導向磁帶儲存單元時，找不到可用的磁帶機(所有 drive path 都是 down，但媒體可用)。需確認 ltid 服務是否在運作、透過 Device Monitor 將磁帶機 Up，必要時清潔磁帶機。"},
  "2822": {short:"雲端/VM 還原的儲存網域類型不支援", detail:"還原作業時目標儲存網域(storage domain)類型不受支援，常見於雲端或 VM 還原情境。建議查看 bpVMutil log 進一步定位。"},
  "4239": {short:"找不到該虛擬機 (unable to find the virtual machine)", detail:"NetBackup 在 vCenter 中找不到指定的 VM，常見原因：VM 已關機且 Primary VM 識別方式為 VM hostname（需改用 VM Display Name 或 UUID）、VM 已被更名/移除/遷移、vCenter 認證或 VMware Server list 設定錯誤。建議至 vCenter 確認 VM 是否存在、名稱是否一致。"},
  "4275": {short:"無法合併虛擬機磁碟 (disk consolidation failed)", detail:"NetBackup 在建立快照前、或刪除快照後嘗試合併(consolidate)VM 磁碟失敗。常見於 VM 磁碟有殘留的快照鏈結構複雜或磁碟空間不足。建議至 vCenter 手動執行 Consolidate 後重跑備份。"},
  "4287": {short:"VM 上已存在 NetBackup 建立的快照", detail:"VM 上已有 NBU_SNAPSHOT 或 NBU_RESTORE 開頭的殘留快照，且 policy 設定為偵測到既有快照時直接中止。常見於上次備份的快照未被正確刪除，或兩個 policy 同時對同一台 VM 備份互相衝突。可於 vSphere 手動移除該殘留快照。"},
  "4292": {short:"無法啟用 Change Block Tracking (CBT)", detail:"VM 尚未啟用 CBT 且目前已存在快照(snapshot)，導致 NetBackup 無法在備份時啟用 CBT（vSphere 6.5+ 的已知限制）。需先在 vCenter 手動移除/合併該 VM 的既有快照，再重新執行備份。"},
  "4748": {short:"無法取得該虛擬機資訊 (Java console)", detail:"常見於 Nutanix/VM 環境，因憑證(certificate)或虛擬化平台認證設定問題導致 NetBackup 無法讀取 VM 資訊。建議確認 Virtual Machine Servers 認證是否正確、Master/Media Server 憑證是否過期。"},
  "7625": {short:"SSL 交握失敗 (vnetd proxy)", detail:"與遠端主機的 vnetd proxy 無法完成 SSL 交握，常見原因：憑證遺失/過期/被撤銷、主機間時間差過大(clock skew)、cipher 設定不相容。建議檢查憑證狀態與兩端系統時間是否同步。"},
  "7641": {short:"找不到共同的憑證授權根 (CA Root)", detail:"雙方主機找不到共同信任的 CA Root，無法建立安全連線。常見於 Master Server 重灌/災難復原後憑證資訊不一致，或 Client 端 Server list 設定錯誤指向錯誤的 Master。可能需要重新核發憑證(nbcertcmd)或修正 certmapinfo.json 中的 masterHostId。"},
  "9201": {short:"Service User 權限不足 (無法切換使用者context)", detail:"NetBackup 9.1 後可用非特權 Service User 執行主要服務，若該帳號對指定路徑（如 Catalog 備份的 DR package 路徑）沒有寫入權限，會發生此錯誤。建議確認 Service User 對相關路徑具有寫入權限。"},
};

function errLookupUrl(code){
  return "https://www.veritas.com/content/support/en_US/doc/44037985-127664609-0/v"+ "?q="+encodeURIComponent(code);
}

function renderErrTable(){
  let rows = Object.keys(ERR_CODES).map(k=>{
    const e = ERR_CODES[k];
    return `<tr><td>${k}</td><td>${e.short}</td><td>${e.detail}</td></tr>`;
  }).join("");
  document.getElementById("errCodeTable").innerHTML = `
    <div class="table-scroll">
    <table>
      <tr><th>Code</th><th>簡述</th><th>可能原因 / 查詢方向</th></tr>
      ${rows}
    </table>
    </div>
    <p class="small">未列出的代碼請至 <a style="color:var(--accent)" href="https://www.veritas.com/content/support/en_US/doc/44037985-127664609-0" target="_blank">Veritas NetBackup Status Codes Reference Guide</a> 依代碼查詢。</p>
  `;
}
renderErrTable();

// ---------- Parsing ----------
const HEADER_ALIASES = ["job status","client name","policy name","status code","job start time"];

function detectDelimiter(line){
  if(line.includes("\t")) return "\t";
  // fallback: 2+ spaces
  return /\s{2,}/;
}

function splitLine(line, delim){
  if(delim === "\t") return line.split("\t");
  return line.split(delim).filter(s=>s.length);
}

function parseDate(str){
  if(!str) return null;
  str = str.trim();
  // formats like 2026/7/5 上午 08:15:00 or 2026-07-05 08:15:00 or 7/5/2026 8:15 AM
  let d = new Date(str.replace(/上午/,"AM").replace(/下午/,"PM"));
  if(!isNaN(d)) return d;
  // try yyyy/mm/dd hh:mm
  const m = str.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})[^\d]+(\d{1,2}):(\d{2})(:(\d{2}))?/);
  if(m){
    return new Date(+m[1], +m[2]-1, +m[3], +m[4], +m[5], +(m[7]||0));
  }
  return null;
}

function parsePasted(raw){
  const lines = raw.split(/\r?\n/).map(l=>l.trim()).filter(l=>l.length>0);
  if(lines.length===0) return {rows:[], headerIdx:-1, cols:[]};

  // find header line
  let headerIdx = -1;
  for(let i=0;i<lines.length;i++){
    const low = lines[i].toLowerCase();
    let hits = HEADER_ALIASES.filter(a=>low.includes(a)).length;
    if(hits>=2){ headerIdx = i; break; }
  }

  let cols = [];
  let dataLines = [];
  if(headerIdx>=0){
    const delim = detectDelimiter(lines[headerIdx]);
    cols = splitLine(lines[headerIdx], delim).map(c=>c.trim());
    dataLines = lines.slice(headerIdx+1);
  } else {
    // no header found - assume standard NBU report column order
    cols = ["Job Status","Job Type","Client Name","Policy Name","Job Duration","Throughput (KB/sec)",
            "Schedule/Level Type","Schedule Name","Job Start Time","Job End Time","Protected Data Size(KB)",
            "Post Deduplication Size(KB)","Deduplication Savings (KB)","Total Optimization %","Storage Unit Name","Status Code"];
    dataLines = lines;
  }

  const delim = lines[headerIdx>=0?headerIdx:0].includes("\t") ? "\t" : /\s{2,}/;

  const idx = {};
  cols.forEach((c,i)=>{
    const low = c.toLowerCase();
    if(low.includes("job status")) idx.status=i;
    else if(low.includes("job type")) idx.jobtype=i;
    else if(low.includes("client name")) idx.client=i;
    else if(low.includes("policy name")) idx.policy=i;
    else if(low.includes("schedule/level") || low.includes("schedule type")) idx.level=i;
    else if(low.includes("schedule name")) idx.schedname=i;
    else if(low.includes("start time")) idx.start=i;
    else if(low.includes("end time")) idx.end=i;
    else if(low.includes("status code")) idx.errcode=i;
  });

  const rows = [];
  for(const line of dataLines){
    if(/^report generated/i.test(line)) continue;
    const parts = splitLine(line, delim);
    if(parts.length < 3) continue;
    if(idx.status===undefined) continue;
    const status = (parts[idx.status]||"").trim();
    if(!/^(successful|failed|partially successful)/i.test(status)) continue;
    rows.push({
      status: status,
      jobtype: idx.jobtype!==undefined? (parts[idx.jobtype]||"").trim() : "",
      client: idx.client!==undefined? (parts[idx.client]||"").trim() : "",
      policy: idx.policy!==undefined? (parts[idx.policy]||"").trim() : "",
      level: idx.level!==undefined? (parts[idx.level]||"").trim() : "",
      schedname: idx.schedname!==undefined? (parts[idx.schedname]||"").trim() : "",
      startRaw: idx.start!==undefined? (parts[idx.start]||"").trim() : "",
      start: idx.start!==undefined? parseDate(parts[idx.start]) : null,
      errcode: idx.errcode!==undefined? (parts[idx.errcode]||"").trim() : ""
    });
  }
  return {rows, headerIdx, cols};
}

// ---------- classify oracle arch/full ----------
function renderRelatedBackupCheck(list, snapshotRow, client, policy){
  const snaps = list.filter(r=>r.jobtype==="Snapshot");
  const backups = list.filter(r=>r.jobtype==="Backup");

  const lastSnap = snaps.length ? snaps[snaps.length-1] : null;
  const lastBackup = backups.length ? backups[backups.length-1] : null;

  const snapOk = lastSnap ? isSuccess(lastSnap.status) : null;
  const backupOk = lastBackup ? isSuccess(lastBackup.status) : null;

  const snapLine = snapOk===null ? "Snapshot：無紀錄" : (snapOk ? `Snapshot：後續成功 (${lastSnap.startRaw})` : `Snapshot：後續仍失敗 (最新 ${lastSnap.startRaw})`);
  const backupLine = backupOk===null ? "Backup：無紀錄（可能因 Snapshot 失敗而未觸發）" : (backupOk ? `Backup：後續成功 (${lastBackup.startRaw})` : `Backup：後續仍失敗 (最新 ${lastBackup.startRaw})`);

  return `<div class="small" style="margin-top:6px;">
    <b>${client} / ${policy}</b> 這台主機 —<br>
    <span style="color:${snapOk===false?'var(--bad)':'var(--ok)'}">${snapLine}</span>　
    <span style="color:${backupOk===false?'var(--bad)':(backupOk===null?'var(--sub)':'var(--ok)')}">${backupLine}</span>
  </div>`;
}

function isFailLike(status){
  return /^failed/i.test(status);
}
function isSuccess(status){
  return /^successful/i.test(status) || /^partially successful/i.test(status);
}
function statusTag(status){
  if(/^failed/i.test(status)) return '<span class="tag bad">Failed</span>';
  if(/^partially successful/i.test(status)) return '<span class="tag ok">Partially Successful</span>';
  return '<span class="tag ok">OK</span>';
}

let lastResult = null;

function analyze(){
  const raw = document.getElementById("pasteArea").value;
  const parsed = parsePasted(raw);
  lastResult = parsed;
  document.getElementById("parseStat").textContent =
    parsed.rows.length + " 筆有效紀錄解析完成" + (parsed.headerIdx<0? "（未偵測到表頭，使用預設欄位順序，若結果異常請確認欄位對應）":"");

  if(parsed.rows.length===0){
    document.getElementById("summaryCard").style.display="";
    document.getElementById("summaryBox").innerHTML = '<div class="empty">未解析到有效資料，請確認貼上的內容包含 Job Status / Client Name / Policy Name 等欄位</div>';
    document.getElementById("detailCard").style.display="none";
    return;
  }

  // group by client+policy
  const groups = {};
  for(const r of parsed.rows){
    const key = r.client + " || " + r.policy;
    if(!groups[key]) groups[key] = [];
    groups[key].push(r);
  }
  for(const key in groups){
    groups[key].sort((a,b)=>{
      if(a.start && b.start) return a.start-b.start;
      return 0;
    });
  }

  // summary counts
  let totalFail = parsed.rows.filter(r=>isFailLike(r.status)).length;
  let totalOk = parsed.rows.filter(r=>isSuccess(r.status)).length;

  document.getElementById("summaryCard").style.display="";
  document.getElementById("summaryBox").innerHTML = `
    <div class="row">
      <span class="tag big ${totalFail>0?'bad':'ok'}">失敗 ${totalFail} 筆</span>
      <span class="stat">共解析 ${parsed.rows.length} 筆紀錄 / ${Object.keys(groups).length} 組 Client/Policy</span>
    </div>
  `;

  // need-check: policies where last event is Failed (no later success)
  const needCheck = [];
  for(const key in groups){
    const list = groups[key];
    const last = list[list.length-1];
    if(isFailLike(last.status)){
      const anySuccessAfterFail = list.some(r=> isSuccess(r.status));
      needCheck.push({key, list, last, hasAnySuccess: anySuccessAfterFail});
    }
  }

  // needCheck kept internally for tagging groups (未修復 vs 曾失敗但已修復), no longer shown as separate box

  // detail groups (collapsible)
  document.getElementById("detailCard").style.display="";
  let overviewRows = "";
  let dhtml = "";
  let gi=0;
  let shownGroups=0;
  for(const key in groups){
    gi++;
    const [client,policy] = key.split(" || ");
    const list = groups[key];
    const failRows = list.filter(r=>isFailLike(r.status));
    if(failRows.length===0) continue; // 全部成功的 policy 不顯示
    shownGroups++;
    const tagCls = needCheck.some(n=>n.key===key)? "bad":"warn";
    const tagTxt = needCheck.some(n=>n.key===key)? "未修復":"曾失敗但已修復（後續有成功紀錄）";
    const lastFail = failRows[failRows.length-1];
    const err = ERR_CODES[lastFail.errcode];
    const isUnresolved = needCheck.some(n=>n.key===key);

    // build one-line overview for any group whose last-fail was a Snapshot job
    if(lastFail.jobtype==="Snapshot"){
      const snaps = list.filter(r=>r.jobtype==="Snapshot");
      const backups = list.filter(r=>r.jobtype==="Backup");
      const lastSnap = snaps.length ? snaps[snaps.length-1] : null;
      const lastBackup = backups.length ? backups[backups.length-1] : null;
      const snapOk = lastSnap ? isSuccess(lastSnap.status) : null;
      const backupOk = lastBackup ? isSuccess(lastBackup.status) : null;
      const snapCell = snapOk===null ? '<span class="small">無紀錄</span>' : (snapOk? '<span style="color:var(--ok)">成功</span>' : '<span style="color:var(--bad)">失敗</span>');
      const backupCell = backupOk===null ? '<span class="small">無紀錄</span>' : (backupOk? '<span style="color:var(--ok)">成功</span>' : '<span style="color:var(--bad)">失敗</span>');
      overviewRows += `<tr><td>${client}</td><td>${policy}</td><td>${snapCell}</td><td>${backupCell}</td></tr>`;
    }

    const distinctCodes = [...new Set(failRows.map(r=>r.errcode).filter(c=>c))];
    const codeBadges = distinctCodes.map(c=>{
      const e = ERR_CODES[c];
      return `<span class="badge-type">Error ${c}${e? "："+e.short:""}</span>`;
    }).join(" ");

    // generic recovery info for non-Snapshot types: show when it next succeeded after last failure
    let recoveryHtml = "";
    if(lastFail.jobtype!=="Snapshot"){
      const lastFailIdx = list.indexOf(lastFail);
      const afterFail = list.slice(lastFailIdx+1);
      const nextSuccess = afterFail.find(r=>isSuccess(r.status));
      if(!isUnresolved && nextSuccess){
        recoveryHtml = `<div class="small" style="margin-top:6px;color:var(--ok);">後續已於 <b>${nextSuccess.startRaw}</b> 恢復成功</div>`;
      } else if(isUnresolved){
        recoveryHtml = `<div class="small" style="margin-top:6px;color:var(--bad);">此表格範圍內最後一筆仍為失敗，尚未看到後續成功紀錄</div>`;
      }
    }

    const footerHtml = `
        <div class="errbox" style="margin-top:10px;">
          <div><b>Error Code ${lastFail.errcode||"?"}</b>${err? " ： "+err.short : ""}</div>
          ${err? `<div class="small" style="margin-top:4px;">常見原因：${err.detail}</div>` : `<div class="small" style="margin-top:4px;">此代碼未在內建對照表中，請查詢原廠文件。</div>`}
          ${lastFail.jobtype==="Snapshot" ? renderRelatedBackupCheck(list, lastFail, client, policy) : recoveryHtml}
        </div>`;
    dhtml += `<div class="group">
      <div class="group-head" onclick="toggleGroup(${gi})">
        <span><b>${client}</b> / ${policy}</span>
        <span><span class="tag ${tagCls}">${tagTxt}</span> ${codeBadges} <span class="small">共 ${failRows.length} 筆失敗 / 全部 ${list.length} 筆</span></span>
      </div>
      <div class="group-body" id="gbody${gi}">
        <div class="table-scroll">
        <table>
          <tr><th>狀態</th><th>類型</th><th>Level</th><th>Schedule</th><th>開始時間</th><th>Error Code</th></tr>
          ${failRows.map(r=>`<tr>
            <td>${statusTag(r.status)}</td>
            <td>${r.jobtype}</td><td>${r.level}</td><td>${r.schedname}</td>
            <td>${r.startRaw}</td><td>${r.errcode}${ERR_CODES[r.errcode]? " ("+ERR_CODES[r.errcode].short+")":""}</td>
          </tr>`).join("")}
        </table>
        </div>
        ${footerHtml}
      </div>
    </div>`;
  }
  if(shownGroups===0){
    dhtml = '<div class="empty">本次資料沒有任何 Failed 紀錄，完全不用檢查。</div>';
  }
  const overviewHtml = overviewRows ? `
    <h3>VM Snapshot/Backup 失敗總覽</h3>
    <div class="table-scroll">
    <table style="margin-bottom:16px;">
      <tr><th>Client</th><th>Policy</th><th>Snapshot 後續</th><th>Backup 後續</th></tr>
      ${overviewRows}
    </table>
    </div>` : "";
  document.getElementById("detailBox").innerHTML = overviewHtml + dhtml;
}


function toggleErrRef(){
  const body = document.getElementById("errRefBody");
  const arrow = document.getElementById("errRefArrow");
  const open = body.style.display !== "none";
  body.style.display = open ? "none" : "block";
  arrow.textContent = open ? "▾" : "▴";
}

function toggleGroup(i){
  const el = document.getElementById("gbody"+i);
  el.classList.toggle("open");
}

function clearAll(){
  document.getElementById("pasteArea").value = "";
  document.getElementById("parseStat").textContent = "";
  ["summaryCard","detailCard"].forEach(id=>document.getElementById(id).style.display="none");
}


</script>
